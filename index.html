<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>okadaharuto.com</title>
  <meta name="description" content="okadaharuto.com">
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(0, 0, 0);
      --text: rgb(255, 255, 255);
      --muted: rgba(255, 255, 255, 0.72);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "anthropicSans", "SF Pro Text", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(560px, 100%);
      text-align: center;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.01em;
    }
    .actions { margin-top: 10px; }
    a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.01em;
      transition: color 140ms ease;
    }
    a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <p>constructing...</p>
    <div class="actions">
      <a href="https://hub.okadaharuto.com/">Private Multiagent Session Hub</a>
    </div>
  </main>
</body>
</html>
